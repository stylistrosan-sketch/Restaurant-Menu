<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAYACI RESTAURANT — Menu</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="menu-wrapper">
    <header class="header">
      <img src="logo.png" alt="HAYACI RESTAURANT" class="logo" />
      <h1 class="restaurant-name">HAYACI RESTAURANT</h1>
      <p class="tagline">Fresh • Authentic • Delicious</p>
    </header>

    <main class="menu">
      <section class="menu-section">
        <h2 class="section-title">Our Menu</h2>
        <ul class="menu-list" id="menu-list">
          <li class="menu-item">
            <span class="item-name">Sushi</span>
            <span class="item-dots"></span>
            <span class="item-price">5 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Nigiri</span>
            <span class="item-dots"></span>
            <span class="item-price">2 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Chaumin</span>
            <span class="item-dots"></span>
            <span class="item-price">3 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Fish</span>
            <span class="item-dots"></span>
            <span class="item-price">5 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Roll</span>
            <span class="item-dots"></span>
            <span class="item-price">3 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Tamaki</span>
            <span class="item-dots"></span>
            <span class="item-price">3 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Sushimi</span>
            <span class="item-dots"></span>
            <span class="item-price">2 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Sushimi fry</span>
            <span class="item-dots"></span>
            <span class="item-price">3 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Tuna</span>
            <span class="item-dots"></span>
            <span class="item-price">2 $</span>
          </li>
          <li class="menu-item">
            <span class="item-name">Salmon fry</span>
            <span class="item-dots"></span>
            <span class="item-price">3 $</span>
          </li>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <p>Thank you for dining with us</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
